<!doctype html>
<html lang="de" id="htmlRoot">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>BVB – Rangliste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --yellow:  #FDE100;
      --black:   #0A0A0A;
      --grey:    #1E1E1E;
      --grey2:   #2A2A2A;
      --grey3:   #141414;
      --muted:   #888888;
      --text:    #FFFFFF;
      --angle:   34deg;
      --gold:    #FDE100;
      --silver:  #B0B8C1;
      --bronze:  #CD7F3A;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      color: var(--text);
      background-color: var(--black);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* 34° diagonal texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        calc(90deg - var(--angle)),
        rgba(253,225,0,.04) 0px,
        rgba(253,225,0,.04) 1px,
        transparent 1px,
        transparent 28px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Hero slash */
    body::after {
      content: '';
      position: fixed;
      top: -40px; left: -10%;
      width: 120%; height: 340px;
      background: var(--yellow);
      clip-path: polygon(0 0, 100% 0, 100% 60%, 0 100%);
      opacity: .07;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── LANG TOGGLE ─── */
    .lang-toggle {
      display: flex;
      align-items: center;
      background: var(--grey2);
      border: 1px solid rgba(253,225,0,.2);
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      flex-shrink: 0;
    }
    .lang-btn {
      appearance: none; border: 0; background: transparent;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 800;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); padding: 7px 11px;
      cursor: pointer; transition: background .15s, color .15s; line-height: 1;
    }
    .lang-btn.active { background: var(--yellow); color: var(--black); }
    .lang-btn:not(.active):hover { color: var(--yellow); }
    .lang-divider { width: 1px; height: 18px; background: rgba(253,225,0,.2); flex-shrink: 0; }

    /* ─── WRAP ─── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 520px; /* match prediction form width */
      margin: 0 auto;
      padding: 2rem 18px calc(3rem + env(safe-area-inset-bottom));
    }

    /* ─── NAV ROW ─── */
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    /* ─── EYEBROW ─── */
    .eyebrow {
      display: flex; align-items: center;
      justify-content: center; gap: 8px; margin-bottom: 14px;
    }
    .eyebrow-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--yellow) 60%, transparent);
      opacity: .4;
    }
    .eyebrow-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--yellow);
    }

    /* ─── HERO ─── */
    .hero { text-align: center; margin-bottom: 24px; }
    .hero h1 {
      margin: 0 0 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: clamp(30px, 7vw, 44px);
      text-transform: uppercase; letter-spacing: .04em; line-height: 1.1;
      color: var(--yellow);
      text-shadow: 3px 3px 0 rgba(0,0,0,.6);
    }
    .hero p { margin: 0; font-size: clamp(13px, 3.5vw, 15px); color: #AAAAAA; }

    /* ─── MATCH CONTEXT BAR ─── */
    .match-context {
      display: grid;
      grid-template-columns: 1fr auto; /* score never wraps — always pinned right */
      align-items: center;
      background: var(--grey);
      border: 1px solid rgba(253,225,0,.12);
      border-left: 4px solid var(--yellow);
      padding: 12px 16px;
      margin-bottom: 24px;
      gap: 0 12px;
    }
    .match-teams {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: clamp(13px, 3.8vw, 16px);
      text-transform: uppercase; letter-spacing: .05em;
    }
    .match-score-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: clamp(18px, 5vw, 22px);
      color: var(--yellow); letter-spacing: .08em;
      white-space: nowrap;
    }
    .match-meta {
      font-size: clamp(9px, 2.4vw, 11px); font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); margin-top: 2px;
    }

    /* ─── PODIUM ─── */
    .podium {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: flex-end;
      gap: 6px;
      margin-bottom: 28px;
    }
    .podium-card {
      display: flex; flex-direction: column;
      align-items: center;
      background: var(--grey);
      border: 1px solid rgba(253,225,0,.1);
      border-bottom: 3px solid transparent;
      padding: clamp(10px,3vw,16px) 6px clamp(10px,3vw,12px);
      position: relative;
      transition: transform .2s;
      min-width: 0; /* allow shrinking */
    }
    .podium-card:hover { transform: translateY(-2px); }

    .podium-card.rank-1 {
      border-bottom-color: var(--gold);
      background: #1f1d0e;
      border-color: rgba(253,225,0,.25);
      padding-top: clamp(14px,4vw,22px);
    }
    .podium-card.rank-2 { border-bottom-color: var(--silver); }
    .podium-card.rank-3 { border-bottom-color: var(--bronze); }

    .podium-rank {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(22px, 6vw, 38px); /* tighter min so 320px doesn't overflow */
      line-height: 1;
      margin-bottom: 4px;
    }
    .rank-1 .podium-rank { color: var(--gold); }
    .rank-2 .podium-rank { color: var(--silver); }
    .rank-3 .podium-rank { color: var(--bronze); }

    .podium-avatar {
      width: clamp(34px,9vw,52px); height: clamp(34px,9vw,52px);
      border-radius: 0;
      background: var(--grey2);
      display: grid; place-items: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: clamp(13px,4vw,20px);
      color: var(--yellow);
      margin-bottom: 6px;
      clip-path: polygon(8% 0%, 100% 0%, 92% 100%, 0% 100%);
      border: 1px solid rgba(253,225,0,.15);
    }
    .rank-1 .podium-avatar {
      background: rgba(253,225,0,.12);
      border-color: rgba(253,225,0,.4);
    }

    .podium-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: clamp(11px,3vw,14px);
      text-transform: uppercase; letter-spacing: .04em;
      text-align: center; color: var(--text);
      margin-bottom: 4px;
      /* truncate long nicknames */
      width: 100%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .podium-pts {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: clamp(16px,4.5vw,22px);
      color: var(--yellow); line-height: 1;
      display: flex; align-items: baseline; gap: 3px;
    }
    .podium-pts-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted);
    }

    /* crown removed */
    .podium-card.rank-1::before { display: none; }

    /* ─── LEADERBOARD TABLE ─── */
    .lb-header {
      display: flex; align-items: stretch;
      justify-content: space-between;
      margin-bottom: 0; padding: 0;
    }
    .lb-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: 11px;
      text-transform: uppercase; letter-spacing: .16em;
      color: var(--black);
      background: var(--yellow);
      padding: 5px 20px 5px 12px;
      clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 100%, 0% 100%);
    }
    .lb-count {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 900;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--black);
      background: var(--yellow);
      padding: 5px 12px 5px 20px;
      clip-path: polygon(10px 0%, 100% 0%, 100% 100%, 0% 100%);
    }

    .lb-table { display: flex; flex-direction: column; gap: 0; }

    .lb-row {
      position: relative;
      display: grid;
      grid-template-columns: clamp(58px,16vw,76px) 1fr auto;
      align-items: center;
      gap: 0;
      overflow: hidden;
      cursor: default;
      border-bottom: 1px solid rgba(255,255,255,.04);
      min-height: 54px;
      background: var(--grey);
      transition: background .15s;
    }
    .lb-row:nth-child(even) { background: #181818; }
    .lb-row:hover           { background: #242424; }

    .lb-row::after { display: none; }

    /* "Du" / highlight row */
    .lb-row.highlight {
      background: var(--yellow) !important;
      border-bottom-color: rgba(0,0,0,.1);
    }
    .lb-row.highlight .lb-pos        { color: rgba(0,0,0,.18); }
    .lb-row.highlight .lb-name       { color: var(--black); }
    .lb-row.highlight .lb-trend      { color: rgba(0,0,0,.4); }
    .lb-row.highlight .lb-pts        { color: var(--black); }
    .lb-row.highlight .lb-you-tag    { background: var(--black); color: var(--yellow); }

    .lb-pos {
      position: relative; z-index: 1;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(20px, 5vw, 34px);
      line-height: 1;
      text-align: center;
      color: rgba(255,255,255,.22);
      user-select: none;
      letter-spacing: -.02em;
    }

    /* Name block */
    .lb-info {
      position: relative; z-index: 1;
      padding: 10px 6px 10px 12px;
      min-width: 0;
    }
    .lb-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: clamp(14px, 3.8vw, 18px);
      text-transform: uppercase; letter-spacing: .04em;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lb-row.highlight .lb-name { color: var(--black); }
    .lb-you-tag {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 900;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--black); background: var(--yellow);
      padding: 1px 6px; margin-top: 3px;
      clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
    }
    .lb-trend { font-size: 10px; margin-left: 6px; vertical-align: middle; }
    .up   { color: #3ddc84; }
    .down { color: #ff4d4d; }
    .same { color: #333; }

    /* Points column */
    .lb-pts-col {
      position: relative; z-index: 1;
      padding: 0 14px 0 8px;
      text-align: right; white-space: nowrap;
    }
    .lb-pts {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: clamp(22px, 5vw, 28px);
      color: var(--text); line-height: 1;
    }

    /* ─── YOU CONTEXT (sticky user row) ─── */
    .you-context {
      position: sticky;
      bottom: 0;
      z-index: 10;
      margin: 0 -18px;
      padding: 28px 18px 0;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: linear-gradient(to bottom, transparent 0%, var(--black) 28px);
    }
    .you-gap {
      display: flex; align-items: center;
      gap: 10px; padding: 6px 0 4px;
    }
    .you-gap::before, .you-gap::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(253,225,0,.15);
    }
    .you-gap-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: rgba(253,225,0,.4); white-space: nowrap;
      transition: color .15s;
    }
    .you-gap-text:hover { color: var(--yellow); }
    #lb-you .lb-row.neighbour {
      background: #161616; opacity: .7;
    }
    #lb-you .lb-row.neighbour:hover { opacity: 1; }

    /* ─── LOAD MORE ─── */
    .load-more-wrap { margin-top: 16px; text-align: center; }
    .load-more {
      appearance: none; border: 1px solid rgba(253,225,0,.25);
      background: transparent;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 800;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); padding: 10px 28px;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: background .15s, color .15s;
    }
    @media (hover: hover) {
      .load-more:hover { background: var(--yellow); color: var(--black); }
    }

    /* ─── NAV LINK BACK ─── */
    .nav-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      transition: color .15s;
    }
    .nav-back:hover { color: var(--yellow); }
    .nav-back::before { content: '←'; font-size: 16px; }

    /* ─── FOOTER ─── */
    .footer {
      margin-top: 28px; text-align: center;
      font-size: .65em; color: #3A3A3A; line-height: 1.5;
    }
    .footer a { color: #555; text-decoration: underline; }
    .footer a:hover { color: var(--yellow); }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero         { animation: fadeUp .4s ease both; }
    .match-context{ animation: fadeUp .4s .08s ease both; }
    .podium       { animation: fadeUp .4s .14s ease both; }
    .lb-table     { animation: fadeUp .4s .2s ease both; }

    .lb-row { animation: fadeUp .3s ease both; }

    /* stagger rows */
    .lb-row:nth-child(1)  { animation-delay: .22s; }
    .lb-row:nth-child(2)  { animation-delay: .25s; }
    .lb-row:nth-child(3)  { animation-delay: .28s; }
    .lb-row:nth-child(4)  { animation-delay: .31s; }
    .lb-row:nth-child(5)  { animation-delay: .34s; }
    .lb-row:nth-child(6)  { animation-delay: .37s; }
    .lb-row:nth-child(7)  { animation-delay: .40s; }
    .lb-row:nth-child(8)  { animation-delay: .43s; }
    .lb-row:nth-child(9)  { animation-delay: .46s; }
    .lb-row:nth-child(10) { animation-delay: .49s; }

    /* i18n fade */
    [data-i18n] { transition: opacity .18s ease; }
    body.lang-switching [data-i18n] { opacity: 0; }

    @media (max-width: 400px) {
      .lb-pred { display: none; }
      .lb-row  { grid-template-columns: 44px 1fr auto; }
    }
  </style>
</head>
<body>

  <main class="wrap">

    <div class="nav-row">
      <a class="nav-back" href="bvb-napovej-rezultat.html" data-i18n="nav_back">Zurück zur Vorhersage</a>
      <!-- Language toggle -->
      <div class="lang-toggle" role="group" aria-label="Language">
        <button class="lang-btn active" id="btn-de" onclick="setLang('de')">DE</button>
        <span class="lang-divider"></span>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
      </div>
    </div>

    <!-- Eyebrow -->
    <div class="eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-text" data-i18n="eyebrow">Gewinnspiel</span>
      <span class="eyebrow-line"></span>
    </div>

    <!-- Hero -->
    <header class="hero">
      <h1 data-i18n="hero_h1">Rangliste</h1>

    </header>

    <!-- Match context -->
    <div class="match-context">
      <div>
        <div class="match-teams">BVB <span style="color:var(--muted);font-weight:700">vs</span> FC Bayern</div>
        <div class="match-meta" data-i18n="match_meta">Bundesliga · Signal Iduna Park · 12. Apr 2025</div>
      </div>

      <div style="text-align:center;flex-shrink:0">
        <div class="match-score-badge">2 : 1</div>
        <div class="match-meta" data-i18n="match_result_label">Endergebnis</div>
      </div>
    </div>

    <!-- Podium top 3 -->
    <div class="podium" id="podium"></div>

    <!-- Full leaderboard -->
    <div class="lb-header">
      <span class="lb-title" data-i18n="lb_title">Alle Teilnehmer</span>
      <span class="lb-count" data-i18n="pts_col_label">Pkt</span>
    </div>

    <div class="lb-table" id="lb-table"></div>

    <div class="load-more-wrap">
      <button class="load-more" id="load-more-btn" data-i18n="load_more">Mehr laden</button>
    </div>

    <!-- Sticky user position context — always visible -->
    <div class="you-context" id="you-context">
      <div class="you-gap" id="you-gap"></div>
      <div class="lb-table" id="lb-you"></div>
    </div>

    <footer class="footer">
      <span data-i18n="footer_links">
        <a href="bvb-napovej-rezultat.html" data-i18n="footer_predict">Vorhersage abgeben</a>
        &nbsp;|&nbsp;
        <a href="https://www.bvb.de/game-rules">Teilnahmebedingungen</a>
        &nbsp;|&nbsp;
        <a href="https://www.bvb.de/privacy">Datenschutz</a>
      </span>
    </footer>

  </main>

  <script>
    /* ─── TRANSLATIONS ─── */
    const i18n = {
      de: {
        nav_back:           'Zurück zur Vorhersage',
        eyebrow:            'Gewinnspiel',
        hero_h1:            'Rangliste',
        hero_p:             'BVB vs. FC Bayern München · Bundesliga',
        match_meta:         'Bundesliga · Signal Iduna Park · 12. Apr 2025',
        match_result_label: 'Endergebnis',
        lb_title:           'Alle Teilnehmer',
        load_more:          'Mehr laden',
        pts_label:          'Pkt',
        pts_col_label:      'Pkt',

        pred_label:         'Tipp',
        footer_predict:     'Vorhersage abgeben',
        doc_title:          'BVB – Rangliste',
      },
      en: {
        nav_back:           'Back to prediction',
        eyebrow:            'Competition',
        hero_h1:            'Leaderboard',
        hero_p:             'BVB vs. FC Bayern München · Bundesliga',
        match_meta:         'Bundesliga · Signal Iduna Park · 12 Apr 2025',
        match_result_label: 'Final score',
        lb_title:           'All participants',
        load_more:          'Load more',
        pts_label:          'pts',
        pts_col_label:      'Pts',

        pred_label:         'Pred',
        doc_title:          'BVB – Leaderboard',
      }
    };

    let currentLang = 'de';

    function setLang(lang) {
      if (lang === currentLang) return;
      currentLang = lang;
      document.body.classList.add('lang-switching');
      setTimeout(() => { applyLang(lang); document.body.classList.remove('lang-switching'); }, 180);
    }

    function applyLang(lang) {
      const t = i18n[lang];
      document.getElementById('htmlRoot').lang = lang;
      document.title = t.doc_title;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key] !== undefined) el.innerHTML = t[key];
      });
      document.getElementById('btn-de').classList.toggle('active', lang === 'de');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      // re-render pts labels
      document.querySelectorAll('.pts-label').forEach(el => el.textContent = t.pts_label);
      document.querySelectorAll('.pred-col-label').forEach(el => el.textContent = t.pred_label);
    }

    /* ─── MOCK DATA ─── */
    const nicknames = [
      'BVB_Franky','GelbeWand09','SignalIduna7','DortmundDevil',
      'EchteLiebe88','BlackYellow4ever','Südtribüne1','HammerKalle',
      'RuhrpottKing','BVBultras09','Borussenfan','DerEchte09',
      'WallBanger','KeepingItYellow','NordkurveNiko','Borusse1909',
      'TigerTorsten','RevierBoss','GelberSturm','MiaSanNix',
      'DortmundPride','SchwartzGelb','KloppoForever','09forever',
      'RuhrpottRocker','BVBTifoso','WestfalenWolf','IdunaPark23',
      'DerBVBler','EchterBorusse'
    ];

    const trends = ['up','up','same','down','up','same','same','down','up','down',
                    'same','up','down','same','up','down','up','same','down','up'];

    function randScore() {
      return `${Math.floor(Math.random()*5)} : ${Math.floor(Math.random()*5)}`;
    }
    function initials(nick) {
      return nick.replace(/[^a-zA-Z]/g, '').slice(0,2).toUpperCase();
    }

    const entries = Array.from({length: 20}, (_, i) => {
      const nick = nicknames[i % nicknames.length];
      return {
        name: nick,
        initials: initials(nick),
        pts: Math.floor(Math.random() * 80) + 20,
        pred: randScore(),
        trend: trends[i % trends.length],
        highlight: i === 7,
      };
    }).sort((a, b) => b.pts - a.pts);

    // Extra pool for paginated rows (positions 4–99)
    const extraPool = Array.from({length: 96}, (_, i) => ({
      name: nicknames[(i + 3) % nicknames.length] + (i >= nicknames.length ? `_${Math.floor(i/nicknames.length)}` : ''),
      pts:  Math.max(1, entries[0].pts - 4 - i * Math.floor(Math.random() * 3 + 1)),
      trend: trends[i % trends.length],
    }));

    /* ─── RENDER PODIUM ─── */
    const podiumOrder = [1, 0, 2]; // visual: 2nd | 1st | 3rd
    const podiumEl = document.getElementById('podium');

    podiumOrder.forEach(idx => {
      const e = entries[idx];
      const rank = idx + 1;
      const rankColors = { 1: 'var(--gold)', 2: 'var(--silver)', 3: 'var(--bronze)' };
      podiumEl.innerHTML += `
        <div class="podium-card rank-${rank}">
          <div class="podium-rank">${rank}</div>
          <div class="podium-avatar" style="color:${rankColors[rank]}">${e.initials}</div>
          <div class="podium-name">${e.name}</div>
          <div class="podium-pts">${e.pts} <span class="podium-pts-label pts-label">Pkt</span></div>
        </div>`;
    });

    // Fix podium visual order: 2nd left, 1st centre (taller), 3rd right
    const cards = podiumEl.querySelectorAll('.podium-card');
    // cards are rendered as [2nd, 1st, 3rd] — correct order in grid

    /* ─── RENDER TABLE (rows 4+) ─── */
    const tableEl  = document.getElementById('lb-table');
    const PAGE_SIZE = 10;
    const YOU_POS  = 1909;
    let visibleCount = 0;

    function appendRows(from, to) {
      extraPool.slice(from, to).forEach((e, i) => {
        const pos = from + i + 4;
        const trendIcon = { up: '▲', down: '▼', same: '—' }[e.trend];
        const row = document.createElement('div');
        row.className = 'lb-row';
        row.innerHTML = `
          <div class="lb-pos">${pos}</div>
          <div class="lb-info">
            <div class="lb-name">${e.name} <span class="lb-trend ${e.trend}">${trendIcon}</span></div>
          </div>
          <div class="lb-pts-col">
            <span class="lb-pts">${e.pts}</span>
          </div>`;
        tableEl.appendChild(row);
      });
    }

    function loadMore() {
      const from = visibleCount;
      const to   = Math.min(visibleCount + PAGE_SIZE, extraPool.length);
      appendRows(from, to);
      visibleCount = to;

      const btn = document.getElementById('load-more-btn');
      if (visibleCount >= extraPool.length) {
        btn.style.display = 'none';
      } else {
        btn.textContent = i18n[currentLang].load_more;
      }
    }

    // Initial load
    loadMore();

    document.getElementById('load-more-btn').addEventListener('click', loadMore);

    /* ─── YOU CONTEXT (1909th place mock) ─── */
    const youEntry = { name: 'DerBVBler', pts: 7, trend: 'down', initials: 'DB' };
    const above    = { name: 'RuhrpottRocker', pts: 8, trend: 'same' };
    const below    = { name: 'WestfalenWolf',  pts: 6, trend: 'up'   };

    const youGapEl = document.getElementById('you-gap');
    const youEl    = document.getElementById('lb-you');

    youGapEl.innerHTML = `<span class="you-gap-text" id="you-gap-text" data-i18n="you_position" style="cursor:pointer">↓ Deine Position</span>`;

    document.getElementById('you-gap-text').addEventListener('click', () => {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });



    const youRows = [
      { e: above,    pos: YOU_POS - 1, cls: 'neighbour' },
      { e: youEntry, pos: YOU_POS,     cls: 'highlight'  },
      { e: below,    pos: YOU_POS + 1, cls: 'neighbour'  },
    ];

    youRows.forEach(({ e, pos, cls }) => {
      const trendIcon = { up: '▲', down: '▼', same: '—' }[e.trend];
      const youTag = cls === 'highlight' ? `<span class="lb-you-tag">Du</span>` : '';
      youEl.innerHTML += `
        <div class="lb-row ${cls}">
          <div class="lb-pos">${pos}</div>
          <div class="lb-info">
            <div class="lb-name">${e.name} <span class="lb-trend ${e.trend}">${trendIcon}</span></div>
            ${youTag}
          </div>
          <div class="lb-pts-col">
            <span class="lb-pts">${e.pts}</span>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
